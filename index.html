<style>
.dropbtn {
  margin-left:  10px;
  background-color: #3498DB;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.dropbtn:hover, .dropbtn:focus {
}

.dropdown {
  colour: black;
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  min-width: 160px;
  overflow: auto;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  position: relative;
  color: black;
  background-color: white;
  font-size: 16px;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.dropdown a:hover {background-color: #ddd;}

.show {display: block;}

	</style>

	</head>
<body>

<div class="dropdown">
<div align = "left">
  <button onclick="myFunction()" class="dropbtn">Explore</button>
  <div id="myDropdown" class="dropdown-content">
    <a href="https://www.linkedin.com/in/manuel-lemos-31a821170/">Linkedin</a>
    <a href="#projects">Projects & Accomplishments</a>
    <a href="https://drive.google.com/file/d/1L8nLmR5WgyKTJ2UoumHYpn2lTnl-l_sV/view?usp=sharing">Resume</a>
    <a href="#contact">Contact Information</a>
  </div>
</div>

<script>
/* When the user clicks on the button, 
toggle between hiding and showing the dropdown content */
function myFunction() {
  document.getElementById("myDropdown").classList.toggle("show");
}

// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
</script>
